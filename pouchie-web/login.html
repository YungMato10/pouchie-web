<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Přihlášení – Pouchie</title>
  <meta name="description" content="Pouchie nabízí praktické a diskrétní krabičky na sáčky pro každodenní nošení.">
  <link rel="icon" href="assets/logos/Logo_monogram_black.png">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>
  <main class="login-page">
    <section class="login-card">
      <div class="login-logo">
        <a href="index.html">
          <img src="assets/logos/Logo_black.png" alt="Pouchie logo">
        </a>
      </div>

      <h1>Přihlášení</h1>
      <p>Zadejte svůj e-mail a pokračujte dál.</p>

      <form data-placeholder-form>
        <div class="form-group">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" name="email" autocomplete="email">
        </div>

        <button class="btn btn-primary btn-full" type="submit">Pokračovat</button>
      </form>

      <div class="login-footer">
        <a href="index.html">Zpět na hlavní stránku</a>
      </div>
    </section>
  </main>

  <div class="toast" data-toast></div>
  <script src="js/main.js"></script>
</body>
</html>
